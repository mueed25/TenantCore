version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: tenantcore_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: tenantcore
      POSTGRES_PASSWORD: tenantcore_dev
      POSTGRES_DB: tenantcore
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U tenantcore']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.2-alpine
    container_name: tenantcore_redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
